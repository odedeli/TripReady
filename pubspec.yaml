name: tripready
description: Personal travel planner and task manager.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  google_fonts: ^6.2.1
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  uuid: ^4.4.0
  file_picker: ^8.1.2
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
