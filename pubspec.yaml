name: tripready
description: Personal travel planner and task manager.
publish_to: 'none'
version: 1.4.1+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ">=0.19.0 <1.0.0"
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  uuid: ^4.4.0
  file_picker: ^8.1.2
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  excel: ^4.0.6
  shared_preferences: ^2.3.2
  flutter_svg: ^2.0.10+1
  http: ^1.2.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  country_flags: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logos/TripReady_Logo_color_nocaption.svg
    - assets/logos/TripReady_Logo_color.svg
    - assets/logos/TripReady_Logo_color_landscape.svg
    - assets/logos/TripReady_Logo_mono_nocaption.svg
    - assets/logos/TripReady_Logo_mono.svg
    - assets/logos/TripReady_Logo_mono_landscape.svg
    - assets/logos/app_icon_512.png
    - assets/logos/app_icon_192.png
    - assets/data/cities.json
    - assets/data/app_info.json
    - assets/logos/app_icon_mono_white.png

