name: Build Windows Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── 1. Check out code ───────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Flutter ──────────────────────────────────
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      # ── 3. Enable Windows desktop target ────────────────────
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      # ── 4. Get dependencies ─────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 5. Build Windows release ────────────────────────────
      - name: Build Windows release
        run: flutter build windows --release

      # ── 6. Zip the release folder ───────────────────────────
      - name: Zip release bundle
        run: |
          cd build\windows\x64\runner
          Compress-Archive -Path Release -DestinationPath TripReady_v1.0_Windows_x64.zip
        shell: powershell

      # ── 7. Upload artifact ──────────────────────────────────
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TripReady-Windows-zip
          path: build\windows\x64\runner\TripReady_v1.0_Windows_x64.zip
          retention-days: 30
