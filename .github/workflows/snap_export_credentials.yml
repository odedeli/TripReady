name: Export Snap Credentials (run once)
# Run this manually, copy the output into SNAPCRAFT_STORE_CREDENTIALS secret, then delete this file.
on:
  workflow_dispatch:
    inputs:
      snap_name:
        description: 'Snap name'
        default: 'tripready'
      channels:
        description: 'Channels'
        default: 'stable,edge'

jobs:
  export-credentials:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Export login token
        run: |
          # This will print a token you can paste into the SNAPCRAFT_STORE_CREDENTIALS secret.
          # You will be prompted to log in via browser — check the Actions log for the URL.
          snapcraft export-login \
            --snaps ${{ github.event.inputs.snap_name }} \
            --channels ${{ github.event.inputs.channels }} \
            --acls package_upload,package_release \
            -
        # The token is printed to stdout in the Actions log.
        # Copy everything between "Begin credential" and "End credential" lines.
