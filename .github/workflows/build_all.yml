What was wrong and what's fixed:

The error was libsqlite3.so: No such file or directory. Your system had libsqlite3.so.0 (the versioned file) but sqflite_common_ffi specifically looks for the unversioned libsqlite3.so symlink, which only exists when the -dev package is installed — not on end-user machines.

