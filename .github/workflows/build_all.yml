Good questions to clarify before starting.
1. Flutter Projects

Flutter projects don't have a fixed required location — they live wherever you choose to create them. When you run flutter create my_app_name, the project is created in whatever directory your terminal is currently pointing to.

The common convention is to keep them all in one folder, something like:

C:\Users\YourName\flutter_projects\

or simply your Documents folder. You decide. Just pick one folder and always cd into it before running flutter create.

To check where your terminal currently is, run cd on its own in the Windows terminal.
2. Git

Same answer — Git has no fixed project location either. Git is a tool that you initialize inside a project folder. Flutter actually does this automatically — when you run flutter create, it initializes a Git repo inside that project folder for you already.

What you may be thinking of is your GitHub/remote repository if you plan to back up or share code online — but that's optional and not required for local vibe coding.
Practical Suggestion

Before your first project, run this once in your terminal to create a dedicated home for all your Flutter work:
bash

mkdir C:\Users\YourName\FlutterProjects
cd C:\Users\YourName\FlutterProjects

Then every time you start a new app, you cd into FlutterProjects first and run flutter create from there. Keeps everything tidy.

