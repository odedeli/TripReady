With the current structure it's actually very straightforward. Here's what it takes:

What already exists that works in your favor:

    AppLocalizations is an abstract class with clean EN and HE implementations
    LanguageService already handles locale persistence and switching
    The language dropdown in Settings is already dynamic
    All 280 strings are keyed — nothing is hardcoded in screens anymore

To add a new language (e.g. French):

    Translator fills in app_fr.arb — a copy of app_en.arb with values translated. This is a plain JSON file, no coding knowledge needed. A volunteer just opens it in any text editor and replaces the English values.
    Run the Python generator — the same script we used to build app_localizations.dart gets a new _AppLocalizationsfr class appended automatically.
    Add the locale to LanguageService.supportedLocales and the Settings dropdown — about 3 lines of code.

That's it. No Flutter toolchain involvement, no pubspec changes, no build system.

What would make this volunteer-friendly at scale:

The main friction point for non-technical volunteers is editing raw JSON. The upgrade path worth considering is a simple web-based translation editor — a hosted HTML page (could even be a Claude artifact) where a volunteer sees a two-column table of English → their language, fills in the right column, and downloads the resulting .arb file. They send it to you, you run the generator, done. No GitHub access or dev environment needed on their end.

The ARB format is also recognized by professional translation tools like POEditor, Lokalise, and Weblate if you ever want a more managed workflow — they all accept .arb files directly.

Estimated effort to add one new language end-to-end: under an hour for a fluent translator working from the ARB file, plus about 10 minutes of your time to run the generator and update the dropdown. The structure you have now scales cleanly to as many languages as needed.

