A binary built on Ubuntu 22.04 or 24.04 will run on:

    ✅ Ubuntu 22.04, 23.x, 24.04
    ✅ Linux Mint 21.x, 22.x (which are based on Ubuntu 22.04/24.04)
    ✅ Most other Debian-based distros with matching glibc version

Build on the oldest Ubuntu version you want to support (22.04 is the safe choice) and the binary will work on all newer versions too. Building on 24.04 may produce a binary that refuses to run on 22.04.
