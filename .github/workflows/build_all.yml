I've read the full document. This is a well-thought-out requirements document. Let me give you a clear summary of what I understood before we start coding, so we're aligned.
What TripReady Is

A personal, fully offline travel management app — your single place for everything related to a trip, from planning to archiving.
Core Structure

The app revolves around Trips as the central object. Each trip owns its own:

    Packing List — items with category, quantity, storage place, status, and sub-tasks per item
    Task List — to-dos with due date and status
    Address Book — hotels, landmarks, restaurants with map links
    Receipts/Expenses — with photo capture, currency, and expense totals
    Documents — tickets, vouchers, letters attached to the trip

Only one trip is active at a time. The rest are either planned or archived.
Key Screens

    Dashboard — opens on the active trip, shows packing progress, task progress, total spend, and a map widget
    Trips List — all trips (active, planned, archived)
    Trip Detail — hub for all the trip's sub-sections
    Packing List — full CRUD, template load/save, export to txt/csv
    Tasks — full CRUD with due dates
    Addresses — full CRUD with map link
    Receipts — full CRUD, photo capture, currency conversion, expense sum
    Archive — completed trips, with ability to clone data to a new trip

MVP Boundaries (what we build now, what we skip)

In for MVP:

    Full offline, local database (SQLite — more practical than MariaDB for Flutter)
    No login
    All core screens above
    Packing list templates (save & load)
    Export to txt/csv
    Receipt photo capture
    Basic currency conversion (manual rate input, no API)
    Dashboard with progress widgets

Out for MVP (as you noted):

    Google Maps/services integration
    Online sync
    Wikipedia/online links (dashboard widget placeholder only)

One Clarification Before Coding

The document mentions MariaDB as the local database, but for Flutter on Windows, Linux, and Android, SQLite (via the sqflite package) is the standard and far simpler choice for a local offline database. MariaDB requires a running server process which doesn't suit a standalone app. SQLite is embedded, requires zero setup, and is what most Flutter apps use.

Are you okay with SQLite instead of MariaDB? It achieves everything you described with no trade-offs for your use case.

Once you confirm that, and if the summary above matches your vision, we start generating the code.

