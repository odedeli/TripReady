Ran a command, read a file

Extract into C:\Users\odede\Projects\tripready\, then run:
powershell

flutter pub get
flutter run -d windows

The root cause: pubspec.yaml had generate: true under the flutter: section. This tells Flutter to use its own internal code generation pipeline, which writes the output to .dart_tool/flutter_gen/gen_l10n/ — completely ignoring both our l10n.yaml output-dir setting and our manually generated lib/generated/app_localizations.dart. Every time flutter run built the app, it was reading from that hidden .dart_tool path which had the old stale 180-key version. Removing generate: true makes Flutter respect our l10n.yaml config and use the pre-generated file in lib/generated/ directly.
