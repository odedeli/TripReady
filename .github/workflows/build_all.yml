name: Build All Platforms

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ── Windows ───────────────────────────────────────────────
  build-windows:
    name: Windows (zip)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Zip release bundle
        run: |
          cd build\windows\x64\runner
          Compress-Archive -Path Release -DestinationPath TripReady_v1.0_Windows_x64.zip
        shell: powershell

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TripReady-Windows-zip
          path: build\windows\x64\runner\TripReady_v1.0_Windows_x64.zip
          retention-days: 30

  # ── Linux ─────────────────────────────────────────────────
  build-linux:
    name: Linux (.deb + tar.gz)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsqlite3-dev patchelf

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Create tar.gz package
        run: |
          cd build/linux/x64/release/
          tar -czvf TripReady_v1.0_Linux_x64.tar.gz bundle/

      - name: Create .deb package
        run: |
          mkdir -p tripready_deb/DEBIAN
          mkdir -p tripready_deb/opt/tripready
          mkdir -p tripready_deb/usr/share/applications

          cp -r build/linux/x64/release/bundle/* tripready_deb/opt/tripready/
          chmod +x tripready_deb/opt/tripready/tripready

          cat > tripready_deb/DEBIAN/control << EOF
          Package: tripready
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: TripReady
          Description: TripReady - Personal Travel Planner
           Offline travel management app for managing trips,
           packing lists, tasks, addresses, receipts and documents.
          EOF

          cat > tripready_deb/usr/share/applications/tripready.desktop << EOF
          [Desktop Entry]
          Name=TripReady
          Comment=Personal Travel Planner
          Exec=/opt/tripready/tripready
          Terminal=false
          Type=Application
          Categories=Utility;
          EOF

          cat > tripready_deb/DEBIAN/postinst << EOF
          #!/bin/bash
          chmod +x /opt/tripready/tripready
          EOF
          chmod +x tripready_deb/DEBIAN/postinst

          dpkg-deb --build tripready_deb TripReady_v1.0_amd64.deb

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: TripReady-Linux-tar
          path: build/linux/x64/release/TripReady_v1.0_Linux_x64.tar.gz
          retention-days: 30

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: TripReady-Linux-deb
          path: TripReady_v1.0_amd64.deb
          retention-days: 30

  # ── Android ───────────────────────────────────────────────
  build-android:
    name: Android (APK)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             TripReady_v1.0_Android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TripReady-Android-apk
          path: TripReady_v1.0_Android.apk
          retention-days: 30
