Place this at .github/workflows/build_all.yml replacing the old file. Two changes explained:

Fix 1 — permissions error
yaml

permissions:
  contents: write

Added at the top level. Without this, GITHUB_TOKEN is read-only by default and softprops/action-gh-release can't upload assets to the release. This one line fixes the error on all three platforms.

Fix 2 — automatic version in filenames Each job has a Resolve version step that reads $GITHUB_REF_NAME:

    On a release event the ref name is your tag (e.g. v1.3.0), so files come out as TripReady_v1.3.0_Windows_x64.zip
    On a push to main or manual run it falls back to dev, giving TripReady_dev_Windows_x64.zip

The .deb also strips the leading v from the version field in the control file (v1.3.0 → 1.3.0) since Debian version strings don't allow the v prefix.
