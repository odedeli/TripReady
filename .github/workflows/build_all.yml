Two separate issues:

1. "Resource not accessible by integration" — the workflow's GITHUB_TOKEN lacks write permission on releases. Easy fix: add permissions block.

2. Version in filenames — yes, there's a clean automatic way. GitHub Actions exposes github.ref_name which gives you the tag name (e.g. v1.3.0) on a release event, and a fallback for push/manual runs. No hardcoding needed.
