1 Mar

Here's the full process to compile TripReady as a Windows executable and package it for distribution.
Step 1 — Build the release exe

In your project folder, run:
bash

cd D:\vibecode_project\tripready
flutter build windows --release
```

This compiles the app in release mode (no debug overhead, smaller and faster). It takes 2–3 minutes.

When done, your build output will be at:
```
build\windows\x64\runner\Release\
```

---

## Step 2 — Inspect the output folder

Open that folder in Explorer. You'll see:
```
Release\
├── tripready.exe          ← your app
├── flutter_windows.dll    ← Flutter engine
├── *.dll                  ← various required DLLs
└── data\                  ← assets, fonts, and Flutter assets

Important: the exe cannot run without the DLLs and the data\ folder beside it. They must always travel together.
Step 3 — Test the release build before packaging

Run the exe directly from that folder (not through flutter run) to confirm it works in release mode:
bash

build\windows\x64\runner\Release\tripready.exe
```

Check that the app launches, data persists, and nothing looks broken. Release mode behaves slightly differently from debug mode so this step matters.

---

## Step 4 — Package for distribution

You have two good options:

### Option A — Simple ZIP (easiest, no installer)
Just zip the entire `Release\` folder and rename it:
```
TripReady_v1.0_Windows.zip

The recipient unzips it anywhere and runs tripready.exe. No installation needed. This is perfectly fine for personal use or sharing with a small group.
Option B — Proper installer with Inno Setup (recommended for wider distribution)

Inno Setup is free and creates a proper Windows installer .exe that puts the app in Program Files, creates a Start Menu shortcut, and adds an uninstaller.

Install Inno Setup: Download from https://jrsoftware.org/isdl.php and install it.

Then create this script — save it as tripready_installer.iss in your project root:
ini

[Setup]
AppName=TripReady
AppVersion=1.0
AppPublisher=Your Name
DefaultDirName={autopf}\TripReady
DefaultGroupName=TripReady
OutputDir=installer_output
OutputBaseFilename=TripReady_v1.0_Setup
Compression=lzma2
SolidCompression=yes
WizardStyle=modern

[Languages]
Name: "english"; MessagesFile: "compiler:Default.isl"

[Tasks]
Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"

[Files]
Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs

[Icons]
Name: "{group}\TripReady"; Filename: "{app}\tripready.exe"
Name: "{group}\Uninstall TripReady"; Filename: "{uninstallexe}"
Name: "{commondesktop}\TripReady"; Filename: "{app}\tripready.exe"; Tasks: desktopicon

[Run]
Filename: "{app}\tripready.exe"; Description: "Launch TripReady"; Flags: nowait postinstall skipifsilent
```

**Then compile the installer:**
- Open Inno Setup
- File → Open → select `tripready_installer.iss`
- Click Build → Compile (or press F9)

This produces `installer_output\TripReady_v1.0_Setup.exe` — a single file that installs everything cleanly.

---

## Step 5 — One thing to be aware of: data location

In release mode, SQLite stores the database in the user's app data folder:
```
C:\Users\<username>\AppData\Roaming\com.example.tripready\

This means:

    Data persists across app updates (as long as the app ID doesn't change)
    Uninstalling via Inno Setup does not delete the user's data (which is correct behaviour)
    If you ever want to change the app identifier, do it before release — changing it after would orphan existing users' data

Summary
Step	Command / Tool
Build	flutter build windows --release
Test	Run Release\tripready.exe directly
Simple package	Zip the Release\ folder
Installer	Inno Setup with the script above

