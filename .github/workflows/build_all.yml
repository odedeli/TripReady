The RC error was caused by my generated Runner.rc missing #include <windows.h>. Without it, the RC compiler doesn't know LANG_ENGLISH, VS_VERSION_INFO, FILEOS, and other Windows-defined constants — so it treats them as file names to look up, producing all those RC2135: file not found errors. The fix is just adding that include at the top.

