One Android-specific thing to know

The APK produced is unsigned (debug-signed with Flutter's default key). This means:

    ✅ You can install it directly on your own Android device via adb install or by copying the APK and opening it (with "Install from unknown sources" enabled in Android settings)
    ✅ Fine for personal use and sharing with friends
    ❌ Cannot be submitted to the Google Play Store (Play requires a proper signing key)

If you ever want Play Store distribution, we'd add a signing step to the workflow using a keystore file stored as a GitHub secret — but that's a separate conversation for later.
How to install the APK on Android

    Download TripReady_v1.0_Android.apk from GitHub Actions artifacts
    Transfer to your Android device (USB, email, Google Drive, etc.)
    On the device: Settings → Security → Enable Install from unknown sources
    Open the APK file on the device and tap Install

