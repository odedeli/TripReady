Prerequisites — on your Linux machine

You need to do this on an actual Linux machine (or a VM/WSL2 won't work for GUI apps — you need a real Ubuntu/Mint desktop environment).
1 — Install Flutter on Linux
bash

# Install snapd if not present (Ubuntu/Mint should have it)
sudo apt update
sudo apt install snapd -y

# Install Flutter via snap
sudo snap install flutter --classic

# Verify
flutter doctor

Alternatively, if you prefer the manual install:
bash

cd ~
wget https://storage.googleapis.com/flutter_releases/linux/stable/flutter_linux_3.x.x-stable.tar.xz
tar xf flutter_linux_*.tar.xz
export PATH="$PATH:$HOME/flutter/bin"

2 — Install Linux build dependencies
bash

sudo apt update
sudo apt install -y \
  curl git unzip xz-utils zip libglu1-mesa \
  clang cmake ninja-build pkg-config \
  libgtk-3-dev liblzma-dev libstdc++-12-dev \
  libsqlite3-dev

3 — Enable Linux desktop target
bash

flutter config --enable-linux-desktop
flutter doctor

All entries should be green. The one to watch is Linux toolchain — it needs clang and cmake.
