name: Build All Platforms

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to attach artifacts to (e.g. v1.3.0). Leave empty to skip.'
        required: false
        default: ''

# ── Permissions required to attach files to a release ─────────────────────────
permissions:
  contents: write

jobs:

  # ── Windows ───────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (zip)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_NAME -match '^v\d') {
            echo "tag=$env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT
          } else {
            echo "tag=dev" >> $env:GITHUB_OUTPUT
          }

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Zip release bundle
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          $zip = "TripReady_${tag}_Windows_x64.zip"
          Compress-Archive -Path build\windows\x64\runner\Release -DestinationPath $zip
          echo "ZIP_NAME=$zip" >> $env:GITHUB_OUTPUT
          echo "ZIP_NAME=$zip" >> $env:GITHUB_ENV

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TripReady-Windows-zip
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Attach to GitHub release
        if: github.event_name == 'release' || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.ref_name || inputs.release_tag }}
          files: ${{ env.ZIP_NAME }}

  # ── Linux ─────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (.deb + tar.gz)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "$GITHUB_REF_NAME" =~ ^v[0-9] ]]; then
            echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
          fi

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsqlite3-dev patchelf

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Bundle libsqlite3 into build
        run: |
          cp /usr/lib/x86_64-linux-gnu/libsqlite3.so.0 \
             build/linux/x64/release/bundle/lib/libsqlite3.so

      - name: Create tar.gz package
        run: |
          TAG=${{ steps.ver.outputs.tag }}
          cd build/linux/x64/release/
          tar -czvf TripReady_${TAG}_Linux_x64.tar.gz bundle/
          echo "TAR_NAME=TripReady_${TAG}_Linux_x64.tar.gz" >> $GITHUB_ENV

      - name: Create .deb package
        run: |
          TAG=${{ steps.ver.outputs.tag }}
          # Strip leading 'v' for the Debian version field (e.g. v1.3.0 → 1.3.0)
          DEB_VER="${TAG#v}"
          DEB_NAME="TripReady_${TAG}_amd64.deb"

          mkdir -p tripready_deb/DEBIAN
          mkdir -p tripready_deb/opt/tripready
          mkdir -p tripready_deb/usr/share/applications
          cp -r build/linux/x64/release/bundle/* tripready_deb/opt/tripready/
          chmod +x tripready_deb/opt/tripready/tripready

          cat > tripready_deb/DEBIAN/control << CONTROL
          Package: tripready
          Version: ${DEB_VER}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libblkid1, liblzma5
          Maintainer: TripReady
          Description: TripReady - Personal Travel Planner
           Offline travel management app for managing trips,
           packing lists, tasks, addresses, receipts and documents.
          CONTROL

          cat > tripready_deb/usr/share/applications/tripready.desktop << DESKTOP
          [Desktop Entry]
          Name=TripReady
          Comment=Personal Travel Planner
          Exec=/opt/tripready/tripready
          Terminal=false
          Type=Application
          Categories=Utility;
          DESKTOP

          cat > tripready_deb/DEBIAN/postinst << POSTINST
          #!/bin/bash
          chmod +x /opt/tripready/tripready
          POSTINST
          chmod +x tripready_deb/DEBIAN/postinst

          dpkg-deb --build tripready_deb $DEB_NAME
          echo "DEB_NAME=${DEB_NAME}" >> $GITHUB_ENV

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: TripReady-Linux-tar
          path: build/linux/x64/release/${{ env.TAR_NAME }}
          retention-days: 30

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: TripReady-Linux-deb
          path: ${{ env.DEB_NAME }}
          retention-days: 30

      - name: Attach to GitHub release
        if: github.event_name == 'release' || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.ref_name || inputs.release_tag }}
          files: |
            build/linux/x64/release/${{ env.TAR_NAME }}
            ${{ env.DEB_NAME }}

  # ── Android ───────────────────────────────────────────────────────────────────
  build-android:
    name: Android (APK)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "$GITHUB_REF_NAME" =~ ^v[0-9] ]]; then
            echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          TAG=${{ steps.ver.outputs.tag }}
          APK_NAME="TripReady_${TAG}_Android.apk"
          cp build/app/outputs/flutter-apk/app-release.apk $APK_NAME
          echo "APK_NAME=${APK_NAME}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TripReady-Android-apk
          path: ${{ env.APK_NAME }}
          retention-days: 30

      - name: Attach to GitHub release
        if: github.event_name == 'release' || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.ref_name || inputs.release_tag }}
          files: ${{ env.APK_NAME }}
