Found it. generate: true in pubspec.yaml means Flutter uses its own code generation pipeline — it ignores output-dir entirely and writes the generated file to .dart_tool/flutter_gen/gen_l10n/ instead. Our manually generated lib/generated/app_localizations.dart is being completely bypassed.
